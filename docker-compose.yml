version: '3.8'

services:
  # ──────────────────────────────────────────────
  # 1. BASE DE DATOS — PostgreSQL 15
  # Esquemas: bd_transaccional + bd_catalogos
  # ──────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: mascotas_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: mascotas_db
    ports:
      - "5432:5432"
    volumes:
      - ./backend/db_init:/docker-entrypoint-initdb.d   # Ejecuta init.sql al primer arranque
      - mascotas_db_data:/var/lib/postgresql/data        # Persistencia de datos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mascotas_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # 2. MICROSERVICIO 1 — Usuarios (RF-01)
  # Responsabilidad: Registro, login, RBAC/JWT
  # ──────────────────────────────────────────────
  ms_usuarios:
    build:
      context: ./backend/ms_usuarios
      dockerfile: Dockerfile
    container_name: ms_usuarios
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://admin:password123@db:5432/mascotas_db
      - PORT=3000
      - JWT_SECRET=mascotas_jwt_secret_2024
      - NODE_ENV=development
    expose:
      - "3000"

  # ──────────────────────────────────────────────
  # 3. MICROSERVICIO 2 — Evaluación / IMA (RF-02, RF-03, RF-04)
  # Responsabilidad: Cálculo IMA, catálogos, peso ideal
  # ──────────────────────────────────────────────
  ms_evaluacion:
    build:
      context: ./backend/ms_evaluacion
      dockerfile: Dockerfile
    container_name: ms_evaluacion
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://admin:password123@db:5432/mascotas_db
      - PORT=3000
      - NODE_ENV=development
    expose:
      - "3000"

  # ──────────────────────────────────────────────
  # 4. MICROSERVICIO 3 — Solicitudes / Auditoría
  # Responsabilidad: CRUD solicitudes, historial
  # ──────────────────────────────────────────────
  ms_solicitudes:
    build:
      context: ./backend/ms_solicitudes
      dockerfile: Dockerfile
    container_name: ms_solicitudes
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://admin:password123@db:5432/mascotas_db
      - PORT=3000
      - NODE_ENV=development
    expose:
      - "3000"

  # ──────────────────────────────────────────────
  # 5. MICROSERVICIO 4 — Administración (RF-05)
  # Responsabilidad: PoliticaApoyo, CostoAlimento
  # ──────────────────────────────────────────────
  ms_administracion:
    build:
      context: ./backend/ms_administracion
      dockerfile: Dockerfile
    container_name: ms_administracion
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://admin:password123@db:5432/mascotas_db
      - PORT=3000
      - NODE_ENV=development
    expose:
      - "3000"

  # ──────────────────────────────────────────────
  # 6. API GATEWAY — Nginx (Enruta todo el tráfico)
  # Puerto público: 8080 → el frontend apunta aquí
  # ──────────────────────────────────────────────
  api_gateway:
    build:
      context: ./backend/api_gateway
      dockerfile: Dockerfile
    container_name: api_gateway
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - ms_usuarios
      - ms_evaluacion
      - ms_solicitudes
      - ms_administracion

# ──────────────────────────────────────────────
# VOLÚMENES — Persistencia de BD
# ──────────────────────────────────────────────
volumes:
  mascotas_db_data:
    driver: local
