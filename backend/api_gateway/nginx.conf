# ============================================================
# API Gateway — nginx.conf
# Enruta todo el tráfico del puerto 8080 hacia los
# microservicios correspondientes (comunicación interna Docker).
#
# Arquitectura:
#   Frontend → localhost:8080/api/... → Nginx → ms_xxx:3000
#
# CA-02: Los headers de seguridad se añaden aquí globalmente.
# ============================================================

server {
    listen 80;
    server_name _;

    # ── Headers de seguridad globales (CA-02) ──────────────
    add_header X-Frame-Options          "SAMEORIGIN"   always;
    add_header X-Content-Type-Options   "nosniff"      always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "no-referrer-when-downgrade" always;

    # ── CORS — permitir peticiones desde el frontend React ──
    add_header Access-Control-Allow-Origin  "http://localhost:5173" always;
    add_header Access-Control-Allow-Methods "GET, POST, PATCH, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    # Manejo del preflight OPTIONS
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ── RF-01: Servicio de Usuarios ─────────────────────────
    # Rutas: /api/usuarios/   (login, registro, perfil)
    location /api/usuarios/ {
        proxy_pass         http://ms_usuarios:3000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── RF-02, RF-03, RF-04: Evaluación / Cálculo IMA ──────
    # Rutas: /api/evaluacion/  (catálogos, razas, pesos, IMA)
    location /api/evaluacion/ {
        proxy_pass         http://ms_evaluacion:3000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Auditoría de Solicitudes ────────────────────────────
    # Rutas: /api/solicitudes/  (CRUD, estado, historial)
    location /api/solicitudes/ {
        proxy_pass         http://ms_solicitudes:3000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── RF-05: Administración (Políticas y Costos) ──────────
    # Rutas: /api/admin/  (políticas apoyo, costos alimento)
    location /api/admin/ {
        proxy_pass         http://ms_administracion:3000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Health Check del Gateway ────────────────────────────
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"api_gateway"}';
        add_header Content-Type application/json;
    }

    # ── Catch-all: 404 en JSON ──────────────────────────────
    location / {
        return 404 '{"error":"Ruta no encontrada en el API Gateway"}';
        add_header Content-Type application/json;
    }
}
